name: Test

on: [push, pull_request]

jobs:
  test-ubuntu-latest:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    - name: Compile and run tests.
      run: |
        cd tests
        make
        ./test_doubledouble

  test-macos-latest:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Compile and run tests.
      run: |
        cd tests
        make -f Makefile
        ./test_doubledouble
